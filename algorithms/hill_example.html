<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finding hill</title>
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(11, 50px);
      grid-template-rows: repeat(11, 50px);
      gap: 5px;
      margin-top: 20px;
    }

    .cell {
      background-color: #d9e6f2;
      border: 1px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-family: Arial, sans-serif;
      transition: opacity 0.3s, background-color 0.3s;
    }

    .highlight {
      background-color: #f4a261;
      border: 3px solid #1d3557;
    }

    .dim {
      background-color: #eef3f8;
      opacity: 0.4;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<button onclick="nextStep()">Next</button>

<div class="grid" id="grid"></div>

<script>
  const grid = document.getElementById("grid");
  let step = 0;

  // Create 121 cells
  for (let i = 0; i < 121; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    grid.appendChild(cell);
  }

  function nextStep() {
    const cells = document.querySelectorAll(".cell");
    const centerIndex = 60;
    const rowLength = 11;

    const centerRow = Math.floor(centerIndex / rowLength);
    const centerCol = centerIndex % rowLength;

    // Step 1: highlight center
    if (step === 0) {
      cells.forEach(cell => {
        cell.classList.remove("highlight", "dim");
        cell.textContent = "";
      });

      cells[centerIndex].classList.add("highlight");
      step++;
    }

    // Step 2: show numbers 1–5
    else if (step === 1) {
      cells.forEach(cell => cell.textContent = "");

      const top = centerIndex - rowLength;
      const bottom = centerIndex + rowLength;
      const left = centerIndex - 1;
      const right = centerIndex + 1;

      cells[centerIndex].textContent = "4";
      cells[top].textContent = "1";
      cells[left].textContent = "2";
      cells[right].textContent = "3";
      cells[bottom].textContent = "5";

      step++;
    }

    // Step 3: dim upper + left cells
    else if (step === 2) {
      for (let i = 0; i < cells.length; i++) {
        const row = Math.floor(i / rowLength);
        const col = i % rowLength;

        if (row < centerRow || col < centerCol) {
          cells[i].classList.add("dim");
        }
      }

      step++;
    }

    // Step 4: continue numbering path
    else if (step === 3) {
      let currentNumber = 6;

      let row = centerRow + 1; // start at cell with 5
      let col = centerCol;

      // Move DOWN
      while (row + 1 < rowLength) {
        row++;
        const index = row * rowLength + col;
        cells[index].textContent = currentNumber++;
      }

      // Move RIGHT
      while (col + 1 < rowLength) {
        col++;
        const index = row * rowLength + col;
        cells[index].textContent = currentNumber++;
      }

      // Move UP
      while (row - 1 >= 0) {
        row--;
        const index = row * rowLength + col;
        cells[index].textContent = currentNumber++;
      }

      step++;
    }
  }
</script>

</body>
</html>
